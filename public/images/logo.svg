<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" width="320" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Dancing+Script:wght@400&family=Jost:wght@300;400&display=swap');
    </style>
  </defs>

  <!-- cafe script text -->
  <text
    x="160" y="38"
    text-anchor="middle"
    font-family="'Dancing Script', cursive"
    font-size="22"
    font-weight="400"
    fill="#EFE7D2"
    letter-spacing="1"
  >cafe</text>

  <!-- decorative line left of cafe -->
  <line x1="88" y1="32" x2="118" y2="32" stroke="#EFE7D2" stroke-width="0.8" opacity="0.6"/>
  <!-- decorative line right of cafe -->
  <line x1="202" y1="32" x2="232" y2="32" stroke="#EFE7D2" stroke-width="0.8" opacity="0.6"/>

  <!-- GERVACIOS main text -->
  <text
    x="160" y="82"
    text-anchor="middle"
    font-family="'Cormorant Garamond', Georgia, serif"
    font-size="52"
    font-weight="400"
    fill="#EFE7D2"
    letter-spacing="4"
  >GERVACIOS</text>

  <!-- divider dots -->
  <circle cx="118" cy="104" r="2" fill="#EFE7D2" opacity="0.5"/>
  <circle cx="202" cy="104" r="2" fill="#EFE7D2" opacity="0.5"/>

  <!-- coffee icon - simple bean shape -->
  <ellipse cx="160" cy="104" rx="7" ry="5" fill="none" stroke="#EFE7D2" stroke-width="1" opacity="0.8"/>
  <path d="M156 104 Q160 101 164 104" fill="none" stroke="#EFE7D2" stroke-width="0.8" opacity="0.8"/>

  <!-- COFFEE · BAKERY text -->
  <text
    x="130" y="124"
    text-anchor="middle"
    font-family="'Jost', sans-serif"
    font-size="9"
    font-weight="300"
    fill="#EFE7D2"
    letter-spacing="3"
    opacity="0.75"
  >COFFEE</text>

  <text
    x="192" y="124"
    text-anchor="middle"
    font-family="'Jost', sans-serif"
    font-size="9"
    font-weight="300"
    fill="#EFE7D2"
    letter-spacing="3"
    opacity="0.75"
  >BAKERY</text>
</svg>
